<!DOCTYPE html> <!-- Define que esto es un documento HTML5 -->
<html lang="es"> <!-- Abre el documento HTML en idioma español -->
  <head> <!-- Sección de configuración del documento -->
    <meta charset="UTF-8"> <!-- Define la codificación de caracteres como UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura la página para ser responsiva en móviles -->
    <title>Catálogo de autos</title> <!-- Título que aparece en la pestaña del navegador -->
    <link rel="stylesheet" href="Css/style.css"> <!-- Vincula el archivo CSS para los estilos -->
  </head>
  <body> <!-- Cuerpo donde va todo el contenido visible -->
    <header> <!-- Encabezado de la página -->
      <h1>Catálogo de autos</h1> <!-- Título principal de la página -->
    </header>

    <div class="logos">
      <div class="logo Ford" data-text="Ford">Ford</div>
      <div class="logo Honda" data-text="Honda">Honda</div>
      <div class="logo Toyota" data-text="Toyota">Toyota</div>
      <div class="logo Chevrolet" data-text="Chevrolet">Chevrolet</div>
    </div> <!-- Primer contenedor vacío para futuro 
    contenido -->
    <div id="contenedor2"></div> <!-- Segundo contenedor vacío para futuro contenido -->

    <footer> <!-- Pie de página -->
      <p>este es una página para los aficionados de autos</p> <!-- Texto del pie de página -->
    </footer>
    <script src="Jvscript/logos.js"></script>
  </body>
</html> <!-- Cierra el documento HTML -->
