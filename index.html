<!DOCTYPE html>
<html lang="es"> <!-- Indica que el documento usa HTML y el idioma es español -->
<head>
  <meta charset="UTF-8"> <!-- Define la codificación de caracteres como UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ajusta la vista para móviles -->
  <title>Catálogo de Autos</title> <!-- Texto que aparece en la pestaña del navegador -->
  <link rel="stylesheet" href="Css/style.css"> <!-- Enlaza la hoja de estilos CSS -->
</head>
<body> <!-- Contenido visible de la página -->
  <header> <!-- Encabezado del sitio -->
    <h1>Catálogo de Autos</h1> <!-- Título principal -->
  </header>

  <div id="filtro"> <!-- Contenedor del filtro por marca y modelo -->
    <label for="marca-select">Seleccionar marca:</label> <!-- Etiqueta para selector de marcas -->
    <select id="marca-select"> <!-- Dropdown de marcas -->
      <option value="">Selecciona una marca</option> <!-- Opción por defecto -->
      <option value="Toyota">Toyota</option>
      <option value="Ford">Ford</option>
      <option value="Honda">Honda</option>
      <option value="Chevrolet">Chevrolet</option>
    </select>
    <label for="modelo-select">Seleccionar modelo:</label> <!-- Etiqueta para selector de modelos -->
    <select id="modelo-select"> <!-- Dropdown de modelos (se llenará dinámicamente) -->
      <option value="">Selecciona un modelo</option> <!-- Opción por defecto -->
    </select>
  </div>

  <div id="modelos"> <!-- Contenedor donde se mostrarán las tarjetas de autos -->
    <!-- Solo imágenes de los modelos se mostrarán aquí -->
  </div>

  <footer> <!-- Pie de página -->
    <p>&copy; 2026 Catálogo de Autos. Todos los derechos reservados.</p> <!-- Texto de copyright -->
  </footer>

  <script src="Jvscript/autos.js"></script> <!-- Carga los datos de autos desde el archivo JavaScript -->
  <script> <!-- Script específico para manejar la lógica de filtrado y visualización -->
    const data = autosData; // Usa la data definida en autos.js
    const modelosDiv = document.getElementById('modelos'); // Elemento donde se muestran las tarjetas
    const marcaSelect = document.getElementById('marca-select'); // Dropdown de marcas
    const modeloSelect = document.getElementById('modelo-select'); // Dropdown de modelos

    function displayModelos(cars) { // Función para mostrar una lista de autos
      modelosDiv.innerHTML = ''; // Limpiar antes de renderizar
      cars.forEach(auto => {
        const autoCard = document.createElement('div'); // Crear contenedor para el auto
        autoCard.className = 'auto'; // Asignar clase para estilos
        autoCard.innerHTML = `
          <img src="${auto.imagen}" alt="${auto.modelo}"> <!-- Imagen del auto -->
          <h3>${auto.marca} ${auto.modelo}</h3> <!-- Título con marca y modelo -->
        `;
        modelosDiv.appendChild(autoCard); // Agregar tarjeta a la interfaz
      });
    }

    // Mostrar todos los modelos por defecto (sin filtros)
    displayModelos(data);

    marcaSelect.addEventListener('change', () => { // Evento al cambiar la marca seleccionada
      const selectedMarca = marcaSelect.value; // Marca elegida
      modeloSelect.innerHTML = '<option value="">Selecciona un modelo</option>'; // Reset modelo
      let filtered = data; // Datos filtrados

      if (selectedMarca) { // Si hay marca seleccionada
        filtered = data.filter(auto => auto.marca === selectedMarca); // Filtrar por marca
        filtered.forEach(auto => {
          const option = document.createElement('option'); // Crear opción de modelo
          option.value = auto.modelo; // Valor del modelo
          option.textContent = auto.modelo; // Texto visible del modelo
          modeloSelect.appendChild(option); // Agregar al dropdown de modelos
        });
      } else {
        filtered = data; // Si no hay marca, mostrar todos
      }

      displayModelos(filtered); // Mostrar autos filtrados (por marca o todos)
    });

    modeloSelect.addEventListener('change', () => { // Evento al cambiar el modelo
      const selectedMarca = marcaSelect.value; // Marca escogida
      const selectedModelo = modeloSelect.value; // Modelo escogido

      let filtered = data; // Empieza con todos los autos
      if (selectedMarca) filtered = filtered.filter(auto => auto.marca === selectedMarca); // Filtra por marca si aplica
      if (selectedModelo) filtered = filtered.filter(auto => auto.modelo === selectedModelo); // Filtra por modelo si aplica

      displayModelos(filtered); // Muestra el conjunto final de autos
    });
  </script>
</body>
<!-- Mensaje de Prueba -->
</html>
