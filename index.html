<!DOCTYPE html> <!-- Indica que el documento es HTML5 -->
<html lang="es"> <!-- Documento en español -->
  <head> <!-- Cabecera del documento -->
    <meta charset="UTF-8"> <!-- Codificación de caracteres UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive para móviles -->
    <title>Catálogo de autos</title> <!-- Título de la pestaña -->
    <link rel="stylesheet" href="Css/style.css"> <!-- Enlace al CSS principal -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> <!-- Enlace a Bootstrap CSS -->
  </head>
  <body> <!-- Cuerpo de la página -->
    <header> <!-- Encabezado -->
      <h1>Catálogo de Autos-2026</h1> <!-- Título principal -->
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> <!-- Enlace a Bootstrap JS -->

    <div class="logos"> <!-- Contenedor de los logos de autos -->
      <div class="logo Ford" data-marca="Ford"> <!-- Logo Ford -->
        <img src="images/logos/Ford.jpeg" alt="Logo de Ford" class="logo-image"> <!-- Imagen Ford -->
        FORD <!-- Texto Ford -->
      </div>
      <div class="logo Honda" data-marca="Honda"> <!-- Logo Honda -->
        <img src="images/logos/Honda.jpeg" alt="Logo de Honda" class="logo-image"> <!-- Imagen Honda -->
        HONDA <!-- Texto Honda -->
      </div>
      <div class="logo Toyota" data-marca="Toyota"> <!-- Logo Toyota -->
        <img src="images/logos/Toyota.jpeg" alt="Logo de Toyota" class="logo-image"> <!-- Imagen Toyota -->
        TOYOTA <!-- Texto Toyota -->
      </div>
      <div class="logo Chevrolet" data-marca="Chevrolet"> <!-- Logo Chevrolet -->
        <img src="images/logos/Chevrolet.jpeg" alt="Logo de Chevrolet" class="logo-image"> <!-- Imagen Chevrolet -->
        CHEVROLET <!-- Texto Chevrolet -->
      </div>
    </div>

    <!-- Modal para mostrar imagen y descripción -->
    <div id="modalAuto" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;"> <!-- Modal oculto por defecto -->
      <div style="background:#fff; padding:20px; border-radius:8px; max-width:700px; min-width:350px; display:flex; flex-direction:row; align-items:center; gap:30px; position:relative;"> <!-- Contenido modal -->
        <img id="imagenAuto" src="" alt="Auto" style="width:400px; height:400px; object-fit:contain;"> <!-- Imagen del auto -->
        <div style="flex:1; display:flex; flex-direction:column; justify-content:space-between; height:400px;"> <!-- Columna de descripción y botón -->
          <p id="descrAuto" style="margin-bottom:30px;"></p> <!-- Descripción del auto -->
          <button id="botonSeleccionar" style="align-self:flex-end; padding:8px 20px; font-size:1rem;">Volver</button> <!-- Botón para volver -->
        </div>
      </div>
    </div>

    <p id="instrucciones" class="instrucciones">Haga click en una imágen para ver más detalles.</p>

  <!-- Formulario de creación de Usuario -->
  <div class="formulario" id="formulario_usuario"> <!-- Contenedor para el registro de usuario -->
    <div class="btn-group" role="group" aria-label="Acciones">
      <button type="button" id="boton_inicio_sesion" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#inicioSesionModal">Iniciar Sesión</button>
      <button type="button" id="boton_registro" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#registroModal">Registrarse</button>
    </div>
  </div>

  <!-- Modal: Inicio de sesión (mantiene textos y atributos) -->
  <div class="modal fade" id="inicioSesionModal" tabindex="-1" aria-labelledby="inicioSesionLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="inicioSesionLabel">Iniciar Sesión</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <p>Ingrese sus datos</p>
          <div class="mb-3">
            <label for="inicio-email" class="form-label">Correo</label>
            <input id="inicio-email" type="email" name="correo" class="form-control" placeholder="@correo.cl" required>
          </div>
          <div class="mb-3">
            <label for="inicio-password" class="form-label">Contraseña</label>
            <input id="inicio-password" type="password" name="contraseña" class="form-control" placeholder="Contraseña min.8" minlength="8" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" id="button_signing" class="btn btn-primary">Iniciar Sesión</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="button_exit_signing">Volver</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Registro de usuario (mantiene valores y placeholders) -->
  <div class="modal fade" id="registroModal" tabindex="-1" aria-labelledby="registroLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="registroLabel">Registro de Usuario</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <form id="registroForm">
            <div class="mb-3">
              <label for="registro-usuario" class="form-label">Nombre de Usuario</label>
              <input id="registro-usuario" type="text" name="usuario" class="form-control" placeholder="Nombre de Usuario" required>
            </div>
            <div class="mb-3">
              <label for="registro-email" class="form-label">Correo</label>
              <input id="registro-email" type="email" name="correo" class="form-control" placeholder="@correo.cl" required>
            </div>
            <div class="mb-3">
              <label for="registro-password" class="form-label">Contraseña</label>
              <input id="registro-password" type="password" name="contraseña" class="form-control" placeholder="Contraseña min.8 carácteres" minlength="8" required>
            </div>
            <div class="mb-3">
              <label for="registro-password-confirm" class="form-label">Confirmar Contraseña</label>
              <input id="registro-password-confirm" type="password" name="confirmar_contraseña" class="form-control" placeholder="Confirmar Contraseña" minlength="8" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="submit" form="registroForm" class="btn btn-success" id="button_register">Registrar</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="button_exit_register">Volver</button>
        </div>
      </div>
    </div>
  </div>

  <footer> <!-- Pie de página -->
    <p>Esta es una página para los aficionados de autos</p> <!-- Texto del pie de página -->
  </footer>
  <script src="Jvscript/logos.js"></script> <!-- Script principal de interacción -->
  <script src="Jvscript/formulario.js"></script> <!-- Script para modal de formulario -->
  </body>
</html> <!-- Fin del documento HTML -->
