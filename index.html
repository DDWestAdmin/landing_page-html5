<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Autos</title>
  <link rel="stylesheet" href="Css/style.css">
</head>
<body>
  <header>
    <h1>Catálogo de Autos</h1>
  </header>

  <div id="filtro">
    <label for="marca-select">Seleccionar marca:</label>
    <select id="marca-select">
      <option value="">Selecciona una marca</option>
      <option value="Toyota">Toyota</option>
      <option value="Ford">Ford</option>
      <option value="Honda">Honda</option>
      <option value="Chevrolet">Chevrolet</option>
    </select>
    <label for="modelo-select">Seleccionar modelo:</label>
    <select id="modelo-select">
      <option value="">Selecciona un modelo</option>
    </select>
  </div>

  <div id="modelos">
    <!-- Solo imágenes de los modelos se mostrarán aquí -->
  </div>

  <footer>
    <p>&copy; 2026 Catálogo de Autos. Todos los derechos reservados.</p>
  </footer>

  <script src="Jvscript/autos.js"></script>
  <script>
    const data = autosData;
    const modelosDiv = document.getElementById('modelos');
    const marcaSelect = document.getElementById('marca-select');
    const modeloSelect = document.getElementById('modelo-select');

    function displayModelos(cars) {
      modelosDiv.innerHTML = '';
      cars.forEach(auto => {
        const autoCard = document.createElement('div');
        autoCard.className = 'auto';
        autoCard.innerHTML = `
          <img src="${auto.imagen}" alt="${auto.modelo}">
          <h3>${auto.marca} ${auto.modelo}</h3>
        `;
        modelosDiv.appendChild(autoCard);
      });
    }

    // Mostrar todos los modelos por defecto (solo imágenes + marca/modelo)
    displayModelos(data);

    marcaSelect.addEventListener('change', () => {
      const selectedMarca = marcaSelect.value;
      modeloSelect.innerHTML = '<option value="">Selecciona un modelo</option>';
      let filtered = data;

      if (selectedMarca) {
        filtered = data.filter(auto => auto.marca === selectedMarca);
        filtered.forEach(auto => {
          const option = document.createElement('option');
          option.value = auto.modelo;
          option.textContent = auto.modelo;
          modeloSelect.appendChild(option);
        });
      } else {
        filtered = data;
      }

      displayModelos(filtered);
    });

    modeloSelect.addEventListener('change', () => {
      const selectedMarca = marcaSelect.value;
      const selectedModelo = modeloSelect.value;

      let filtered = data;
      if (selectedMarca) filtered = filtered.filter(auto => auto.marca === selectedMarca);
      if (selectedModelo) filtered = filtered.filter(auto => auto.modelo === selectedModelo);

      displayModelos(filtered);
    });
  </script>
</body>
</html>
